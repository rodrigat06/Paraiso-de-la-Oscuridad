<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Añadir cantante - Paraiso de la Oscuridad</title>
  <link rel="icon" href="../inicio/img/logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">
      <img src="../inicio/img/logo.png" alt="">
      <span>Añadir cantante</span>
    </a>
    <nav class="nav">
      <a href="../explorar/index.html">Explorar</a>
      <a href="../guia/index.html">Guia</a>
    </nav>
  </header>

  <main class="page">
    <section class="panel">
      <h1>Proponer cantante famoso</h1>
      <p>Para no romper la estetica, solo se pueden añadir artistas conocidos que encajan con pop alternativo, dark pop o visual pop.</p>

      <!-- Formulario controlado: no deja meter cualquier texto inventado. -->
      <form id="artistForm">
        <label for="artist">Cantante</label>
        <select id="artist" name="artist">
          <option value="Ashnikko|Alt pop">Ashnikko</option>
          <option value="Poppy|Alt metal pop">Poppy</option>
          <option value="Grimes|Art pop">Grimes</option>
          <option value="Björk|Art pop">Björk</option>
          <option value="FKA twigs|Experimental pop">FKA twigs</option>
        </select>

        <label for="note">Nota opcional</label>
        <textarea id="note" name="note" rows="4" placeholder="Por que encaja con la pagina..."></textarea>

        <button type="submit">Añadir a mi lista</button>
        <p id="message" class="message"></p>
      </form>
    </section>

    <section class="panel">
      <h2>Lista guardada</h2>
      <div id="savedList" class="saved-list"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
