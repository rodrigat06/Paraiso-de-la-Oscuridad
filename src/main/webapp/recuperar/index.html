<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar cuenta - Paraiso de la Oscuridad</title>
  <link rel="icon" href="../inicio/img/logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-page">
    <a class="back" href="../login/index.html">Volver</a>

    <!-- Recuperacion simple: no mete paneles ni efectos extra. -->
    <section class="auth-box">
      <img class="logo" src="img/ataud.png" alt="">
      <h1>Recuperar cuenta</h1>
      <p>Escribe tu correo para iniciar la recuperacion.</p>

      <form id="recoverForm">
        <label for="email">Correo</label>
        <input id="email" name="email" type="email" required>

        <button type="submit">Recuperar</button>
        <p id="message" class="message"></p>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
