<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Paraiso de la Oscuridad</title>
  <link rel="icon" href="../inicio/img/logo.png">
  <link rel="stylesheet" href="registro.css">
</head>
<body>
  <main class="auth-page">
    <a class="back" href="../login/login.html">Volver</a>

    <!-- Registro: formulario pequeño y conectado a /auth/register. -->
    <section class="auth-box">
      <img class="logo" src="img/vende-tu-alma.png" alt="">
      <h1>Crear cuenta</h1>
      <p>Datos basicos para poder iniciar sesion despues.</p>

      <form id="registerForm">
        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" required>

        <label for="apellido">Apellido</label>
        <input id="apellido" name="apellido" required>

        <label for="email">Correo</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Registrarme</button>
        <p id="message" class="message"></p>
      </form>
    </section>
  </main>
  <script src="registro.js"></script>
</body>
</html>
