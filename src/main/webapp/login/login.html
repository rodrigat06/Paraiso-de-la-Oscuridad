<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - Paraiso de la Oscuridad</title>
  <link rel="icon" href="../inicio/img/logo.png">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main class="auth-page">
    <a class="back" href="../pagina-principal.html">Volver</a>

    <section class="auth-box">
      <img class="logo" src="img/carnero.png" alt="">
      <h1>Entrada a la plaga</h1>
      <p>Usa tu correo y contraseña para entrar.</p>

      <form id="loginForm">
        <label for="email">Correo</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Entrar</button>
        <p id="message" class="message"></p>
      </form>

      <nav class="links">
        <a href="../registro/registro.html">Crear cuenta</a>
        <a href="../recuperar/recuperar.html">Olvide mi contraseña</a>
      </nav>
    </section>
  </main>
  <script src="login.js"></script>
</body>
</html>
